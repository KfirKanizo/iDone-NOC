services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: noc
      POSTGRES_PASSWORD: nocpass
      POSTGRES_DB: nocdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noc -d nocdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  twilio_mock:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn mock_twilio:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://noc:nocpass@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TWILIO_MOCK_URL=http://twilio_mock:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      twilio_mock:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app:app worker -l info
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://noc:nocpass@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PYTHONPATH=/app
      - TWILIO_MOCK_URL=http://twilio_mock:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      twilio_mock:
        condition: service_started

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app:app flower --port=5555 --url_prefix=flower --basic_auth=${FLOWER_ADMIN_USER}:${FLOWER_ADMIN_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://noc:nocpass@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
