services:
  postgres:
    image: postgres:15
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: noc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nocdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noc -d nocdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - internal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://noc:${POSTGRES_PASSWORD}@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - BASE_URL=${BASE_URL:-https://noc.idone.co.il}
    networks:
      - internal-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app:app worker -l info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://noc:${POSTGRES_PASSWORD}@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PYTHONPATH=/app
      - BASE_URL=${BASE_URL:-https://noc.idone.co.il}
    networks:
      - internal-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app:app flower --port=5555 --url_prefix=flower --basic_auth=${FLOWER_ADMIN_USER}:${FLOWER_ADMIN_PASSWORD}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://noc:${POSTGRES_PASSWORD}@postgres:5432/nocdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PYTHONPATH=/app
    networks:
      - internal-network
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    # המלצה: אתה יכול למחוק את הבלוק ports לגמרי, כי NPM ניגש אליו ישירות ברשת הפנימית
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - internal-network  # בשביל לדבר עם api, flower ו-dozzle
      - proxy-network     # בשביל לקבל תעבורה מ-Nginx Proxy Manager
    depends_on:
      - api
      - flower
      - dozzle

  dozzle:
    image: amir20/dozzle:latest
    environment:
      DOZZLE_NO_ANALYTICS: "1"
      DOZZLE_BASE: /dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal-network
    restart: always

volumes:
  postgres_data:

networks:
  internal-network:    # הרשת הפנימית המבודדת של ה-NOC
    driver: bridge
  proxy-network:       # הרשת החיצונית המשותפת עם NPM
    external: true