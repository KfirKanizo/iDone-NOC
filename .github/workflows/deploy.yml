name: Docker CI/CD Service Manager (PRD)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        type: choice
        options:
          - deploy
          - start
          - stop

jobs:
  manage-docker-service:
    runs-on: ubuntu-latest
    environment: tst
    
    permissions:
      contents: read
    
    steps:
      - name: Check Network Connectivity
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Testing connection to $HOST on port $PORT..."
          nc -vz -w 5 $HOST $PORT

      - name: Execute via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BRANCH: ${{ github.ref_name }}
          EVENT_ACTION: ${{ github.event.inputs.action }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # הסרנו מכאן את העברת הקבצים הכבדים
          envs: BRANCH,EVENT_ACTION,EVENT_NAME,GITHUB_TOKEN
          script_stop: true
          script: |
            set -x 
            echo "--- STARTING SCRIPT EXECUTION ---"
            export GIT_TERMINAL_PROMPT=0
            
            PROJECT_DIR="/opt/stacks/iDone-NOC"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            ACTION=$EVENT_ACTION
            if [ "$EVENT_NAME" == "push" ]; then
              ACTION="deploy"
            fi
            
            if [ "$ACTION" == "stop" ]; then
              docker compose down
              exit 0
            fi
            
            if [ "$ACTION" == "start" ]; then
              docker compose up -d
              exit 0
            fi
            
            if [ "$ACTION" == "deploy" ]; then
              echo "Deploying new code from branch: $BRANCH..."
              
              git init
              git remote remove origin 2>/dev/null || true
              git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
              
              git fetch origin
              git reset --hard origin/$BRANCH
              
              echo "Generating configuration files securely..."
              
              cat << 'EOF' > .env
${{ secrets.ENV_PRD }}
EOF
              
              cat << 'EOF' > docker-compose.yml
${{ secrets.DOCKER_COMPOSE_PRD }}
EOF
              
              docker compose down
              docker compose up -d --build < /dev/null
              docker image prune -f
              
              echo "Deployment completed successfully!"
            fi