name: Docker CI/CD Service Manager (PRD)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        type: choice
        options:
          - deploy
          - start
          - stop

jobs:
  manage-docker-service:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PRD: ${{ secrets.ENV_PRD }}
          DOCKER_COMPOSE_PRD: ${{ secrets.DOCKER_COMPOSE_PRD }}
          BRANCH: ${{ github.ref_name }}
          EVENT_ACTION: ${{ github.event.inputs.action }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: ENV_PRD,DOCKER_COMPOSE_PRD,BRANCH,EVENT_ACTION,EVENT_NAME,GITHUB_TOKEN
          script: |
            # Target project directory on the server
            PROJECT_DIR="/opt/stacks/iDone-NOC"
            
            # Create the directory if it doesn't exist and navigate into it
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            ACTION=$EVENT_ACTION
            # If the event is an automatic push, treat it as a deploy action
            if [ "$EVENT_NAME" == "push" ]; then
              ACTION="deploy"
            fi
            
            if [ "$ACTION" == "stop" ]; then
              echo "Stopping Docker containers..."
              docker compose down
              exit 0
            fi
            
            if [ "$ACTION" == "start" ]; then
              echo "Starting Docker containers..."
              docker compose up -d
              exit 0
            fi
            
            if [ "$ACTION" == "deploy" ]; then
              echo "Deploying new code from branch: $BRANCH..."
              
              # Initialize git and set up secure remote using the temporary GitHub token
              git init
              git remote remove origin 2>/dev/null || true
              git remote add origin https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
              git fetch origin
              git reset --hard origin/$BRANCH
              
              # Generate the .env and docker-compose.yml files from GitHub Secrets
              echo "$ENV_PRD" > .env
              echo "$DOCKER_COMPOSE_PRD" > docker-compose.yml
              echo "Configuration files generated securely."
              
              # Stop existing containers, rebuild, and start the new ones
              docker compose down
              docker compose up -d --build
              
              # Remove unused Docker images to free up disk space
              docker image prune -f
              
              echo "Deployment completed successfully!"
            fi